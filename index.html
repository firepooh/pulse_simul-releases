<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pulse_simul Web Flasher</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; max-width: 820px;
         margin: 0 auto; padding: 24px 16px 64px; line-height: 1.5; }
  h1 { font-size: 1.5rem; }
  .card { border: 1px solid #8883; border-radius: 10px; padding: 16px 18px; margin: 16px 0; }
  label { font-weight: 600; display: block; margin-bottom: 6px; }
  select, button { font-size: 1rem; padding: 8px 12px; border-radius: 8px; }
  select { width: 100%; box-sizing: border-box; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
  .row > div { flex: 1 1 200px; }
  button { border: 0; color: #fff; background: #2b7de9; cursor: pointer; }
  button.secondary { background: #6c757d; }
  button.danger { background: #d9534f; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  progress { width: 100%; height: 18px; }
  #log { background: #111; color: #b6f2b6; font-family: ui-monospace, monospace; font-size: .85rem;
         padding: 12px; border-radius: 8px; height: 260px; overflow: auto; white-space: pre-wrap; }
  a { color: #2b7de9; }
  .muted { color: #8a8a8a; font-size: .9rem; }
  .warn { background: #ffe9a8; color: #5a4600; padding: 10px 12px; border-radius: 8px; }
</style>
</head>
<body>
  <h1>pulse_simul Web Flasher</h1>
  <p class="muted">속도 펄스 시뮬레이터(JIS D 5601) ESP32-S3 펌웨어를 브라우저에서 바로 플래시합니다.
     Chrome / Edge (데스크톱) 에서 USB 케이블로 보드를 연결해 사용하세요.</p>

  <div id="nowebserial" class="warn" style="display:none">
    이 브라우저는 <b>Web Serial</b> 을 지원하지 않습니다. 데스크톱 <b>Chrome</b> 또는 <b>Edge</b> 로 열어주세요.
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label for="ver">펌웨어 버전 (merged.bin)</label>
        <select id="ver"><option>불러오는 중…</option></select>
      </div>
      <div style="flex:0 0 130px">
        <label for="baud">Baud</label>
        <select id="baud">
          <option value="115200">115200</option>
          <option value="230400">230400</option>
          <option value="460800" selected>460800</option>
          <option value="921600">921600</option>
        </select>
      </div>
    </div>
    <p class="muted" id="dl" style="margin:10px 0 0"></p>
    <div class="btns">
      <button id="connect">1. 연결 (Connect)</button>
      <button id="flash" class="secondary" disabled>2. 플래시 (Flash 0x0)</button>
      <button id="erase" class="danger" disabled>Erase Flash</button>
      <button id="disconnect" class="secondary" disabled>연결 해제</button>
    </div>
    <div style="margin-top:14px">
      <progress id="prog" value="0" max="100"></progress>
      <span id="progtxt" class="muted"></span>
    </div>
  </div>

  <div class="card">
    <label>로그</label>
    <div id="log"></div>
  </div>

  <p class="muted">
    소스는 비공개이며 이 페이지는 <a href="https://github.com/firepooh/pulse_simul-releases/releases">릴리스</a> 의
    바이너리만 사용합니다. 플래싱 엔진: <a href="https://github.com/espressif/esptool-js">esptool-js</a>.
    merged.bin 은 0x0 부터 부트로더·파티션·앱이 모두 포함된 단일 이미지입니다.
  </p>

<script type="module">
  import { ESPLoader, Transport } from "https://cdn.jsdelivr.net/npm/esptool-js@0.5/+esm";
  import CryptoJS from "https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/+esm";

  const $ = (id) => document.getElementById(id);
  const logEl = $("log");
  const log = (s = "") => { logEl.textContent += s + "\n"; logEl.scrollTop = logEl.scrollHeight; };
  const term = { clean(){ logEl.textContent=""; }, writeLine(d){ log(d); }, write(d){ logEl.textContent+=d; logEl.scrollTop=logEl.scrollHeight; } };

  let transport = null, esploader = null, device = null;

  if (!("serial" in navigator)) { $("nowebserial").style.display = "block"; }

  // ---- manifest.json (같은 도메인) 에서 firmware 목록 채우기 → CORS 없음 ----
  async function loadManifest() {
    const sel = $("ver");
    try {
      const res = await fetch("./manifest.json", { cache: "no-store" });
      if (!res.ok) throw new Error("manifest " + res.status);
      const items = await res.json();
      if (!items.length) { sel.innerHTML = "<option>등록된 펌웨어 없음</option>"; return; }
      sel.innerHTML = "";
      items.forEach((o, i) => {
        const op = document.createElement("option");
        op.value = o.file; op.textContent = o.version + (i === 0 ? "  (최신)" : "");
        op.dataset.name = o.file.split("/").pop();
        sel.appendChild(op);
      });
      updateDlLink();
    } catch (e) {
      sel.innerHTML = "<option>목록 로드 실패</option>";
      log("[ERR] manifest 로드 실패: " + e.message);
    }
  }
  function updateDlLink() {
    const op = $("ver").selectedOptions[0];
    if (op && op.dataset.name)
      $("dl").innerHTML = `직접 다운로드: <a href="${op.value}" download>${op.dataset.name}</a>`;
  }
  $("ver").addEventListener("change", updateDlLink);

  // ---- 연결 ----
  $("connect").addEventListener("click", async () => {
    try {
      device = await navigator.serial.requestPort({});
      transport = new Transport(device, true);
      esploader = new ESPLoader({ transport, baudrate: parseInt($("baud").value), terminal: term });
      const chip = await esploader.main();
      log("[OK] 연결됨: " + chip);
      if (!String(chip).toLowerCase().includes("esp32-s3"))
        log("[경고] 이 펌웨어는 ESP32-S3 전용입니다. 감지된 칩이 다릅니다.");
      $("flash").disabled = false; $("erase").disabled = false; $("disconnect").disabled = false;
      $("connect").disabled = true;
    } catch (e) { log("[ERR] 연결 실패: " + e.message); }
  });

  // ---- 선택한 merged.bin(같은 도메인) 다운로드 후 0x0 플래시 ----
  $("flash").addEventListener("click", async () => {
    const op = $("ver").selectedOptions[0];
    if (!op || !op.dataset.name) { log("[ERR] 버전을 선택하세요."); return; }
    $("flash").disabled = true; $("erase").disabled = true;
    try {
      log("[..] 다운로드: " + op.dataset.name);
      const buf = await (await fetch(op.value, { cache: "no-store" })).arrayBuffer();
      const u8 = new Uint8Array(buf);
      let bstr = ""; const CH = 0x8000;
      for (let i = 0; i < u8.length; i += CH) bstr += String.fromCharCode.apply(null, u8.subarray(i, i + CH));
      log(`[..] ${u8.length} bytes, 0x0 에 기록 시작…`);
      await esploader.writeFlash({
        fileArray: [{ data: bstr, address: 0x0 }],
        flashSize: "keep", eraseAll: false, compress: true,
        reportProgress: (idx, written, total) => {
          const pct = Math.round(written / total * 100);
          $("prog").value = pct; $("progtxt").textContent = pct + "%";
        },
        calculateMD5Hash: (image) => CryptoJS.MD5(CryptoJS.enc.Latin1.parse(image)),
      });
      log("[OK] 플래시 완료. 보드를 리셋합니다.");
      try { await esploader.after(); } catch (_) {}
      try { await transport.setRTS(true); await new Promise(r=>setTimeout(r,120)); await transport.setRTS(false); } catch(_){}
    } catch (e) { log("[ERR] 플래시 실패: " + e.message); }
    finally { $("flash").disabled = false; $("erase").disabled = false; }
  });

  // ---- Erase ----
  $("erase").addEventListener("click", async () => {
    if (!confirm("칩 전체 flash 를 지웁니다. 계속할까요?")) return;
    $("flash").disabled = true; $("erase").disabled = true;
    try { log("[..] Erase flash…"); await esploader.eraseFlash(); log("[OK] Erase 완료"); }
    catch (e) { log("[ERR] Erase 실패: " + e.message); }
    finally { $("flash").disabled = false; $("erase").disabled = false; }
  });

  // ---- 연결 해제 ----
  $("disconnect").addEventListener("click", async () => {
    try { if (transport) await transport.disconnect(); } catch (_) {}
    transport = esploader = device = null;
    $("flash").disabled = true; $("erase").disabled = true; $("disconnect").disabled = true;
    $("connect").disabled = false;
    log("[OK] 연결 해제됨");
  });

  loadManifest();
</script>
</body>
</html>
